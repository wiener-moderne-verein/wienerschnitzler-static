name: Accessibility Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  accessibility-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Setup Java for Saxon
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Download Saxon if not present
      run: |
        if [ ! -f saxon/saxon9he.jar ]; then
          ./shellscripts/dl_saxon.sh
        fi

    - name: Fetch data
      run: ./fetch_data.sh

    - name: Build website
      run: ant

    - name: Install accessibility testing tools
      run: npm install -g pa11y

    - name: Start local server for testing
      run: |
        cd html && python3 -m http.server 8000 &
        sleep 3

    - name: Run pa11y accessibility tests
      run: |
        PAGES=(
          "http://localhost:8000/index.html"
          "http://localhost:8000/listplace.html"
          "http://localhost:8000/listplace-en.html"
          "http://localhost:8000/gesamt.html"
          "http://localhost:8000/impressum.html"
          "http://localhost:8000/kontakt.html"
        )

        REPORT_FILE="accessibility-report.md"
        echo "## Accessibility Test Results (WCAG 2.1 AA)" > "$REPORT_FILE"
        echo "" >> "$REPORT_FILE"
        echo "| Page | Status | Issues |" >> "$REPORT_FILE"
        echo "|------|--------|--------|" >> "$REPORT_FILE"

        OVERALL_STATUS=0
        for url in "${PAGES[@]}"; do
          page=$(basename "$url")
          OUTPUT=$(pa11y --standard WCAG2AA --reporter json "$url" 2>/dev/null || true)
          ISSUES=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo "error")
          if [ "$ISSUES" = "0" ]; then
            echo "| $page | PASS | 0 |" >> "$REPORT_FILE"
          elif [ "$ISSUES" = "error" ]; then
            echo "| $page | ERROR | - |" >> "$REPORT_FILE"
            OVERALL_STATUS=1
          else
            echo "| $page | FAIL | $ISSUES |" >> "$REPORT_FILE"
            OVERALL_STATUS=1
          fi
        done

        echo "" >> "$REPORT_FILE"
        echo "Generated: $(date -u)" >> "$REPORT_FILE"
        cat "$REPORT_FILE"
        exit $OVERALL_STATUS
      continue-on-error: true

    - name: Upload accessibility report
      uses: actions/upload-artifact@v5
      with:
        name: accessibility-report
        path: accessibility-report.md

    - name: Comment on PR (if PR)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('accessibility-report.md', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## Accessibility Test Results\n\n${report}`
          });
